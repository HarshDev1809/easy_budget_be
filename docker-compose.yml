services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easy_budget_server
    restart: always
    env_file:
      - /home/hosting/env/easy_budget_be.env
    networks:
      - shared-network
    # No volumes needed — dist is built inside the image
    command: node dist/index.js  # tsc already ran in Dockerfile builder stage
