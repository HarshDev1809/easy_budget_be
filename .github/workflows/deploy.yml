name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'        # matches your Dockerfile
          cache: 'npm'

      - name: Clean node_modules        # ← add this
        run: rm -rf node_modules

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

  deploy:
    name: Deploy
    needs: test
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build & restart container
        run: docker compose up -d --build --force-recreate

      - name: Clean up old images
        run: docker image prune -f
