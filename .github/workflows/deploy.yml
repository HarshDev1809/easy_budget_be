name: Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres
        run: |
          docker run -d --name test-postgres \
            -e POSTGRES_USER=test \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_DB=testdb \
            -p 5432:5432 \
            postgres:16

      - name: Start Redis
        run: |
          docker run -d --name test-redis \
            -p 6380:6379 \
            redis:alpine

      - name: Wait for Postgres to be ready
        run: |
          until docker exec test-postgres pg_isready; do
            sleep 1
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Clean node_modules
        run: rm -rf node_modules

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run migrations
        run: npm run db:push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb

      - name: Run tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          DIRECT_URL: postgresql://test:test@localhost:5432/testdb
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6380
          REDIS_PASSWORD: ""

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f test-postgres test-redis || true

  deploy:
    name: Deploy
    needs: test
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create network if not exists
        run: docker network create shared-network || true

      - name: Build & restart container
        run: docker compose up -d --build --force-recreate

      - name: Clean up old images
        run: docker image prune -f
