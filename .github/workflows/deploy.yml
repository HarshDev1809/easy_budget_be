name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: self-hosted
    services:
      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'        # matches your Dockerfile
          cache: 'npm'

      - name: Clean node_modules        # ← add this
        run: rm -rf node_modules

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          REDIS_HOST: localhost
          REDIS_PORT: 6380
          BETTER_AUTH_SECRET: secret
          BETTER_AUTH_URL: http://localhost:3000
        run: npm run test

  deploy:
    name: Deploy
    needs: test
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Create network if not exists
        run: docker network create shared-network || true

      - name: Build & restart container
        run: docker compose up -d --build --force-recreate

      - name: Clean up old images
        run: docker image prune -f
